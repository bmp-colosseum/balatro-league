# sops-nix key policy. Fill in the age recipients allowed to decrypt secrets:
#   - your personal age public key (so you can edit secrets from your laptop)
#   - the box's age public key (derived from /var/lib/sops-nix/key.txt; or use
#     the host ssh ed25519 key converted with ssh-to-age)
#
# Generate a personal key:   age-keygen -o ~/.config/sops/age/keys.txt
# Then put the public keys below and run:  sops secrets.yaml
creation_rules:
  - path_regex: secrets\.yaml$
    key_groups:
      - age:
          - age1REPLACE_your_personal_public_key
          - age1REPLACE_the_box_public_key
