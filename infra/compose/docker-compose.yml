# Balatro League - full self-hosted stack (Netcup box).
#
# Runs on top of a thin NixOS base (see ../nixos). NixOS owns the OS, Docker
# daemon, firewall, NetBird, and the CI runner; THIS file owns every service.
#
# Two networks enforce the zero-trust posture:
#   proxy    - bridge with internet. Traefik + the web apps + bots.
#   data     - internal:true. NO route to the internet, NO host port. Postgres
#              lives here alone; only containers that also join `data` can reach
#              it. This is the single-box equivalent of an air-gapped DB box.
#
# Config + image tags come from two env files, merged at invocation:
#   docker compose --env-file versions.env --env-file /srv/balatro/secrets.env up -d
#   - versions.env    : image tags (written by CI each deploy; tag == git SHA)
#   - secrets.env     : real secrets (box-local, from .env.example; never committed)
#
# Postgres is published ONLY on 127.0.0.1 so tooling reaches it via an SSH
# tunnel over NetBird, never from the public interface.

x-app-hardening: &app-hardening
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL
  restart: unless-stopped

networks:
  proxy:
    name: proxy
  data:
    name: data
    internal: true

volumes:
  pgdata:
  traefik-acme:

services:
  # ---- edge: TLS termination + routing -------------------------------------
  traefik:
    image: traefik:${TRAEFIK_TAG}
    restart: unless-stopped
    command: []
    ports:
      - "80:80"
      - "443:443"
      # Dashboard on loopback only -> reachable via `ssh -L` over NetBird.
      - "127.0.0.1:8080:8080"
    environment:
      # ACME account email (static file can't interpolate env; set it here).
      TRAEFIK_CERTIFICATESRESOLVERS_LE_ACME_EMAIL: ${ACME_EMAIL}
    volumes:
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/dynamic:/etc/traefik/dynamic:ro
      - traefik-acme:/acme
    networks:
      - proxy

  # ---- data plane: Postgres (no internet, loopback-only host port) ----------
  postgres:
    image: postgres:${POSTGRES_TAG}
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
      # Consumed by initdb/01-init.sh to create per-app roles + databases.
      LEAGUE_DB_PASSWORD: ${LEAGUE_DB_PASSWORD}
      TOUR_DB_PASSWORD: ${TOUR_DB_PASSWORD}
    volumes:
      # Postgres 18 image places data in a version subdir; mount the parent
      # (/var/lib/postgresql), NOT /var/lib/postgresql/data (that crash-loops on 18).
      - pgdata:/var/lib/postgresql
      - ./postgres/initdb:/docker-entrypoint-initdb.d:ro
    # No host port: on the internal `data` network Docker can't publish one
    # anyway. Admin access is `docker exec balatro-postgres-1 psql -U postgres`.
    networks:
      - data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- league: Discord bot (root package) ----------------------------------
  league-bot:
    <<: *app-hardening
    image: ghcr.io/${GHCR_OWNER}/balatro-league-bot:${LEAGUE_BOT_TAG}
    environment:
      NODE_ENV: production
      PORT: "8080"
      DATABASE_URL: postgres://league:${LEAGUE_DB_PASSWORD}@postgres:5432/league
      DISCORD_TOKEN: ${LEAGUE_DISCORD_TOKEN}
      DISCORD_CLIENT_ID: ${LEAGUE_DISCORD_CLIENT_ID}
      DISCORD_GUILD_ID: ${LEAGUE_DISCORD_GUILD_ID}
      LEAGUE_OWNER_DISCORD_ID: ${LEAGUE_OWNER_DISCORD_ID}
      LEAGUE_ADMIN_ROLE_ID: ${LEAGUE_ADMIN_ROLE_ID}
      ADMIN_TOKEN: ${LEAGUE_ADMIN_TOKEN}
      WEB_BASE_URL: https://${LEAGUE_WWW_DOMAIN}
      RESULTS_CHANNEL_ID: ${RESULTS_CHANNEL_ID}
      # RESULTS_WEBHOOK_URL intentionally omitted: an empty string fails the bot's
      # z.string().url() check (Railway left it unset). Result feed uses the
      # LeagueConfig row from the DB instead.
      BOT_COMMANDS_CHANNEL_ID: ${BOT_COMMANDS_CHANNEL_ID}
      DEVOPS_CHANNEL_ID: ${DEVOPS_CHANNEL_ID}
      ANNOUNCEMENTS_CHANNEL_ID: ${ANNOUNCEMENTS_CHANNEL_ID}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - proxy
      - data

  # ---- league: website -----------------------------------------------------
  league-web:
    <<: *app-hardening
    image: ghcr.io/${GHCR_OWNER}/balatro-league-web:${LEAGUE_WEB_TAG}
    environment:
      NODE_ENV: production
      PORT: "3000"
      DATABASE_URL: postgres://league:${LEAGUE_DB_PASSWORD}@postgres:5432/league
      AUTH_SECRET: ${LEAGUE_AUTH_SECRET}
      AUTH_COOKIE_DOMAIN: ${AUTH_COOKIE_DOMAIN}
      # Auth.js v5 sits behind Traefik - trust the forwarded host or logins break.
      AUTH_TRUST_HOST: "true"
      NEXTAUTH_URL: https://${LEAGUE_WWW_DOMAIN}
      DISCORD_CLIENT_ID: ${LEAGUE_DISCORD_CLIENT_ID}
      DISCORD_CLIENT_SECRET: ${LEAGUE_DISCORD_CLIENT_SECRET}
      DISCORD_GUILD_ID: ${LEAGUE_DISCORD_GUILD_ID}
      DISCORD_TOKEN: ${LEAGUE_DISCORD_TOKEN}
      LEAGUE_OWNER_DISCORD_ID: ${LEAGUE_OWNER_DISCORD_ID}
      LEAGUE_ADMIN_ROLE_ID: ${LEAGUE_ADMIN_ROLE_ID}
      ADMIN_TOKEN: ${LEAGUE_ADMIN_TOKEN}
      RESULTS_CHANNEL_ID: ${RESULTS_CHANNEL_ID}
      RESULTS_WEBHOOK_URL: ${RESULTS_WEBHOOK_URL}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - proxy
      - data
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.league-web.rule=Host(`${LEAGUE_DOMAIN}`) || Host(`${LEAGUE_WWW_DOMAIN}`)"
      - "traefik.http.routers.league-web.entrypoints=websecure"
      - "traefik.http.routers.league-web.tls.certresolver=le"
      - "traefik.http.routers.league-web.middlewares=security-headers@file"
      - "traefik.http.services.league-web.loadbalancer.server.port=3000"

  # ---- tour: website -------------------------------------------------------
  tour-web:
    <<: *app-hardening
    image: ghcr.io/${GHCR_OWNER}/balatro-tour-web:${TOUR_WEB_TAG}
    environment:
      NODE_ENV: production
      PORT: "3000"
      DATABASE_URL: postgres://tour:${TOUR_DB_PASSWORD}@postgres:5432/tour
      # Tour reads the league DB for identity resolution (see lib/league-db.ts).
      # TODO: swap to a read-only league role once tables exist.
      LEAGUE_DATABASE_URL: postgres://league:${LEAGUE_DB_PASSWORD}@postgres:5432/league
      AUTH_SECRET: ${TOUR_AUTH_SECRET}
      AUTH_COOKIE_DOMAIN: ${AUTH_COOKIE_DOMAIN}
      # Auth.js v5 sits behind Traefik - trust the forwarded host or logins break.
      AUTH_TRUST_HOST: "true"
      NEXTAUTH_URL: https://${TOUR_DOMAIN}
      AUTH_URL: https://${TOUR_DOMAIN}
      DISCORD_CLIENT_ID: ${TOUR_DISCORD_CLIENT_ID}
      DISCORD_CLIENT_SECRET: ${TOUR_DISCORD_CLIENT_SECRET}
      TOUR_GUILD_ID: ${TOUR_GUILD_ID}
      TOUR_ADMIN_TOKEN: ${TOUR_ADMIN_TOKEN}
      TOUR_OWNER_DISCORD_IDS: ${TOUR_OWNER_DISCORD_IDS}
      NEXT_PUBLIC_LEAGUE_URL: https://${LEAGUE_WWW_DOMAIN}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - proxy
      - data
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.tour-web.rule=Host(`${TOUR_DOMAIN}`)"
      - "traefik.http.routers.tour-web.entrypoints=websecure"
      - "traefik.http.routers.tour-web.tls.certresolver=le"
      - "traefik.http.routers.tour-web.middlewares=security-headers@file"
      - "traefik.http.services.tour-web.loadbalancer.server.port=3000"

  # ---- tour: Discord bot (thin client, calls tour-web) ---------------------
  tour-bot:
    <<: *app-hardening
    image: ghcr.io/${GHCR_OWNER}/balatro-tour-bot:${TOUR_BOT_TAG}
    environment:
      NODE_ENV: production
      PORT: "8080"
      DATABASE_URL: postgres://tour:${TOUR_DB_PASSWORD}@postgres:5432/tour
      DISCORD_TOKEN: ${TOUR_DISCORD_TOKEN}
      TOUR_GUILD_ID: ${TOUR_GUILD_ID}
      TOUR_WEB_URL: https://${TOUR_DOMAIN}
      TOUR_ADMIN_TOKEN: ${TOUR_ADMIN_TOKEN}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - proxy
      - data
