# Promtail: discover running containers via the Docker API and ship their logs
# to Loki, labelled with the friendly container name + log stream. Positions are
# kept in the container's writable tmp so a restart resumes where it left off.
server:
  http_listen_port: 9080
  grpc_listen_port: 0
  log_level: warn

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 15s
    relabel_configs:
      # /balatro-league-bot-1 -> container="balatro-league-bot-1"
      - source_labels: ["__meta_docker_container_name"]
        regex: "/(.*)"
        target_label: container
      # stdout / stderr
      - source_labels: ["__meta_docker_container_log_stream"]
        target_label: stream
      # compose project (balatro / balatro-dev / balatro-mon), handy for filtering
      - source_labels: ["__meta_docker_container_label_com_docker_compose_project"]
        target_label: project
