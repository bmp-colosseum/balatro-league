# Auto-load every dashboard JSON dropped in the mounted dashboards dir. This is
# the scalable pattern: dashboards live as git-tracked files, deploy with the
# stack, and reload every 30s. To add/change one: build it in the UI, Export as
# JSON, drop the file in ../dashboards/, redeploy. No manual clicking survives a
# rebuild otherwise.
apiVersion: 1

providers:
  - name: balatro
    orgId: 1
    folder: Balatro          # dashboards appear under this Grafana folder
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true      # let you tweak in-UI; export the JSON back to git to persist
    options:
      path: /var/lib/grafana/dashboards
