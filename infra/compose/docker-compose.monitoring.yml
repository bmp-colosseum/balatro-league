# Observability stack - Loki (log store) + Promtail (shipper) + Grafana (UI).
# Separate compose project (`balatro-mon`) so it is NOT rolled on every app
# deploy; brought up once and left running. Joins the shared external `proxy`
# network so the single Traefik routes Grafana at grafana.<domain>; loki+promtail
# sit on an internal `mon` network with no internet and no host port.
#
#   docker compose -p balatro-mon \
#     --env-file /srv/balatro/mon.env \
#     -f docker-compose.monitoring.yml up -d
#
# mon.env (box-local, never committed) provides:
#   GRAFANA_ADMIN_PASSWORD=...      # generated on the box
#   GRAFANA_DOMAIN=grafana.balatroleague.com

networks:
  proxy:
    name: proxy
    external: true      # shared with the app stack so the one Traefik routes Grafana
  mon:
    name: mon
    internal: true      # loki/promtail/grafana talk here; no internet, no host port

volumes:
  loki-data:
  grafana-data:

services:
  # ---- log store -----------------------------------------------------------
  loki:
    image: grafana/loki:3.3.2
    restart: unless-stopped
    command: -config.file=/etc/loki/config.yml
    security_opt:
      - no-new-privileges:true
    volumes:
      - ./monitoring/loki-config.yml:/etc/loki/config.yml:ro
      - loki-data:/loki
    networks:
      - mon

  # ---- shipper: tails every container's logs into Loki ---------------------
  # Reads the Docker socket READ-ONLY for service discovery (to label lines with
  # the friendly container name). Trusted first-party container; the :ro mount
  # still exposes container metadata, so it stays off the internet on `mon`.
  promtail:
    image: grafana/promtail:3.3.2
    restart: unless-stopped
    command: -config.file=/etc/promtail/config.yml
    security_opt:
      - no-new-privileges:true
    volumes:
      - ./monitoring/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    networks:
      - mon

  # ---- UI: dashboards, log search, alerts ----------------------------------
  grafana:
    image: grafana/grafana:11.4.0
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_SERVER_ROOT_URL: https://${GRAFANA_DOMAIN}
      GF_SERVER_DOMAIN: ${GRAFANA_DOMAIN}
      # Grafana's own login gates access; don't phone home.
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - loki
    networks:
      - proxy
      - mon
