# Static routing (file provider) - no Docker socket needed. Traefik reaches the
# app containers by their compose service DNS name on the shared `proxy` network.
http:
  routers:
    league-web:
      rule: "Host(`balatroleague.com`) || Host(`www.balatroleague.com`)"
      entryPoints:
        - websecure
      service: league-web
      middlewares:
        - security-headers
      tls:
        certResolver: le
    league-web-dev:
      rule: "Host(`dev.balatroleague.com`)"
      entryPoints:
        - websecure
      service: league-web-dev
      middlewares:
        - security-headers
      tls:
        certResolver: le
    tour-web:
      rule: "Host(`tour.balatroleague.com`)"
      entryPoints:
        - websecure
      service: tour-web
      middlewares:
        - security-headers
      tls:
        certResolver: le
    tour-web-dev:
      rule: "Host(`tour-dev.balatroleague.com`)"
      entryPoints:
        - websecure
      service: tour-web-dev
      middlewares:
        - security-headers
      tls:
        certResolver: le
  services:
    league-web:
      loadBalancer:
        servers:
          - url: "http://league-web:3000"
    league-web-dev:
      loadBalancer:
        servers:
          - url: "http://league-web-dev:3000"
    tour-web:
      loadBalancer:
        servers:
          - url: "http://tour-web:3000"
    tour-web-dev:
      loadBalancer:
        servers:
          - url: "http://tour-web-dev:3000"
