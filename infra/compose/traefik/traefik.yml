# Traefik v3 static config. Dynamic routing comes from Docker labels (see the
# compose file) + the file provider (./dynamic/*.yml). The ACME account email
# is injected via TRAEFIK_CERTIFICATESRESOLVERS_LE_ACME_EMAIL (static files do
# not interpolate env).

api:
  dashboard: true
  # Insecure is acceptable here ONLY because the dashboard entrypoint is
  # published on 127.0.0.1:8080 (compose), reachable solely via an SSH tunnel
  # over NetBird - never on the public interface.
  insecure: true

entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true
  websecure:
    address: ":443"

providers:
  # Routing is defined statically in ./dynamic/*.yml (routers.yml). No Docker
  # provider -> no docker.sock mount -> smaller attack surface, and immune to
  # Docker Engine API-version churn.
  file:
    directory: /etc/traefik/dynamic
    watch: true

certificatesResolvers:
  le:
    acme:
      storage: /acme/acme.json
      # TLS-ALPN-01: no extra ports, no DNS credentials needed. Requires 443
      # reachable from the internet (it is - Traefik owns it).
      tlsChallenge: {}

log:
  level: INFO

accessLog: {}
