# Dev/staging stack - a fully separate env, parallel to prod on the same box.
# Its own Postgres (postgres-dev + pgdata-dev on an internal data-dev network)
# and its own tour-web-dev, reusing the PROD image with dev-only config. Routed
# by the single shared prod Traefik (joins the external `proxy` network) on
# tour-dev.balatroleague.com. Nothing here shares a value with prod.
#
#   docker compose -p balatro-dev \
#     --env-file /srv/balatro/versions.env \
#     --env-file /srv/balatro/secrets.dev.env \
#     -f docker-compose.dev.yml up -d

networks:
  proxy:
    name: proxy       # shared with prod so the one Traefik can route dev
    external: true
  data-dev:
    name: data-dev
    internal: true

volumes:
  pgdata-dev:
  pgdata-league-dev:

services:
  postgres-dev:
    image: postgres:${POSTGRES_TAG}
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      # Single-database instance: the default role/db IS the tour dev DB.
      POSTGRES_USER: tour
      POSTGRES_PASSWORD: ${TOUR_DB_PASSWORD}
      POSTGRES_DB: tour
    volumes:
      - pgdata-dev:/var/lib/postgresql
    networks:
      - data-dev
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tour"]
      interval: 10s
      timeout: 5s
      retries: 5

  tour-web-dev:
    image: ghcr.io/${GHCR_OWNER}/balatro-tour-web:${TOUR_WEB_TAG}
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    environment:
      NODE_ENV: production
      PORT: "3000"
      DATABASE_URL: postgres://tour:${TOUR_DB_PASSWORD}@postgres-dev:5432/tour
      # dev tour has no league integration (Railway dev had no LEAGUE_DATABASE_URL)
      AUTH_SECRET: ${TOUR_AUTH_SECRET}
      AUTH_TRUST_HOST: "true"
      NEXTAUTH_URL: https://${TOUR_DOMAIN}
      AUTH_URL: https://${TOUR_DOMAIN}
      DISCORD_CLIENT_ID: ${TOUR_DISCORD_CLIENT_ID}
      DISCORD_CLIENT_SECRET: ${TOUR_DISCORD_CLIENT_SECRET}
      DISCORD_TOKEN: ${TOUR_DISCORD_TOKEN}
      TOUR_GUILD_ID: ${TOUR_GUILD_ID}
      TOUR_ADMIN_TOKEN: ${TOUR_ADMIN_TOKEN}
      TOUR_OWNER_DISCORD_IDS: ${TOUR_OWNER_DISCORD_IDS}
    depends_on:
      postgres-dev:
        condition: service_healthy
    networks:
      - proxy
      - data-dev

  # ---- league dev (dev.balatroleague.com) - own Postgres, reuses league-web image
  postgres-league-dev:
    image: postgres:${POSTGRES_TAG}
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      POSTGRES_USER: league
      POSTGRES_PASSWORD: ${LEAGUE_DEV_DB_PASSWORD}
      POSTGRES_DB: league
    volumes:
      - pgdata-league-dev:/var/lib/postgresql
    networks:
      - data-dev
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U league"]
      interval: 10s
      timeout: 5s
      retries: 5

  league-web-dev:
    image: ghcr.io/${GHCR_OWNER}/balatro-league-web:${LEAGUE_WEB_TAG}
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    environment:
      NODE_ENV: production
      PORT: "3000"
      DATABASE_URL: postgres://league:${LEAGUE_DEV_DB_PASSWORD}@postgres-league-dev:5432/league
      AUTH_SECRET: ${LEAGUE_DEV_AUTH_SECRET}
      AUTH_TRUST_HOST: "true"
      NEXTAUTH_URL: https://${LEAGUE_DEV_DOMAIN}
      WEB_BASE_URL: https://${LEAGUE_DEV_DOMAIN}
      DISCORD_CLIENT_ID: ${LEAGUE_DEV_DISCORD_CLIENT_ID}
      DISCORD_CLIENT_SECRET: ${LEAGUE_DEV_DISCORD_CLIENT_SECRET}
      DISCORD_GUILD_ID: ${LEAGUE_DEV_DISCORD_GUILD_ID}
      DISCORD_TOKEN: ${LEAGUE_DEV_DISCORD_TOKEN}
      LEAGUE_OWNER_DISCORD_ID: ${LEAGUE_DEV_OWNER_DISCORD_ID}
      ADMIN_TOKEN: ${LEAGUE_DEV_ADMIN_TOKEN}
    depends_on:
      postgres-league-dev:
        condition: service_healthy
    networks:
      - proxy
      - data-dev
