name: deploy

# League app repo -> builds the two LEAGUE images on the shared Netcup box
# (self-hosted runner label: balatro), pushes to GHCR, then rolls ONLY the league
# services in the shared compose stack. The stack itself (compose file, Traefik, the
# shared Postgres, monitoring) is owned by the infra repo (bmp-colosseum-infra); this
# workflow only advances LEAGUE_BOT_TAG / LEAGUE_WEB_TAG in the box's versions.env and
# recreates those containers. Tour images live in balatro-team-tour. Secrets stay
# box-local at /srv/balatro/secrets.env.
on:
  workflow_dispatch:
    inputs:
      deploy:
        description: "Roll the live league services (false = build + push only)"
        type: boolean
        default: false
  push:
    branches: [master]
    paths:
      - "src/**"
      - "web/**"
      - "prisma/**"
      - "package.json"
      - "package-lock.json"
      - "Dockerfile.league-bot"
      - "web/Dockerfile"

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: [self-hosted, balatro]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve names
        id: v
        run: |
          echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"
          echo "tag=$(git rev-parse --short=12 HEAD)" >> "$GITHUB_OUTPUT"

      # Rebuild only the image whose paths changed -- but measured from the commit that
      # is ACTUALLY DEPLOYED for that service, not from the previous push.
      #
      # Why: image tags only advance on a SUCCESSFUL build. If a build fails, that
      # service stays pinned to an older tag. Diffing the last push would then say
      # "nothing in your paths changed -> skip", silently leaving the service stale
      # forever (that is exactly how league-web sat 2 hours behind after a failed
      # type check). Diffing from the DEPLOYED tag is self-healing: a service that
      # missed a build still has the change in its diff and gets retried, while a
      # service that is genuinely current and untouched still correctly skips.
      # Unknown/missing/unresolvable tag (first deploy, "latest", force-push) -> rebuild.
      - name: Pick images
        id: pick
        run: |
          set -euo pipefail
          SHA='${{ github.sha }}'
          VERSIONS=/srv/balatro/versions.env
          deployed() { grep -E "^$1=" "$VERSIONS" 2>/dev/null | tail -1 | cut -d= -f2-; }
          changed_since_deployed() {
            local tag="$1"
            if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then echo "__ALL__"; return; fi
            if [ -z "$tag" ] || [ "$tag" = "latest" ] || ! git cat-file -e "${tag}^{commit}" 2>/dev/null; then
              echo "__ALL__"; return
            fi
            git diff --name-only "$tag" "$SHA"
          }
          # name-regex matches this service's paths; root manifests rebuild everything.
          pick_one() {
            local files; files="$(changed_since_deployed "$1")"
            if [ "$files" = "__ALL__" ] \
              || printf '%s\n' "$files" | grep -qE '^(package\.json$|package-lock\.json$)' \
              || printf '%s\n' "$files" | grep -qE "$2"; then echo 1; else echo 0; fi
          }
          LB_PREV="$(deployed LEAGUE_BOT_TAG)"; LW_PREV="$(deployed LEAGUE_WEB_TAG)"
          LB=$(pick_one "$LB_PREV" '^(src/|prisma/|Dockerfile\.league-bot$)')
          LW=$(pick_one "$LW_PREV" '^(web/|prisma/)')
          echo "deployed now: league-bot=${LB_PREV:-<none>} league-web=${LW_PREV:-<none>} | target=$SHA"
          echo "build -> league-bot=$LB league-web=$LW"
          echo "league_bot=$LB" >> "$GITHUB_OUTPUT"
          echo "league_web=$LW" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        run: echo '${{ secrets.GITHUB_TOKEN }}' | docker login ghcr.io -u '${{ github.actor }}' --password-stdin

      - name: Build + push changed images
        env:
          OWNER: ${{ steps.v.outputs.owner }}
          TAG: ${{ steps.v.outputs.tag }}
        run: |
          set -euo pipefail
          build() { # name dockerfile
            local name="$1" df="$2" img="ghcr.io/$OWNER/$1"
            echo "== building $name =="
            docker build -f "$df" -t "$img:$TAG" -t "$img:latest" .
            docker push "$img:$TAG"; docker push "$img:latest"
          }
          if [ "${{ steps.pick.outputs.league_bot }}" = 1 ]; then build balatro-league-bot Dockerfile.league-bot; else echo "skip league-bot"; fi
          if [ "${{ steps.pick.outputs.league_web }}" = 1 ]; then build balatro-league-web web/Dockerfile; else echo "skip league-web"; fi

      - name: Deploy (roll league services only)
        if: ${{ github.event_name == 'push' || inputs.deploy }}
        env:
          OWNER: ${{ steps.v.outputs.owner }}
          TAG: ${{ steps.v.outputs.tag }}
        run: |
          set -euo pipefail
          # The infra repo owns the compose file + the shared versions.env baseline on the
          # box. We advance only the two league tags here (a service we skipped keeps its
          # previously-deployed tag), preserving GHCR_OWNER + the tour tags. Then recreate
          # only the league containers -- Postgres / Traefik / tour services never move.
          PREV=/srv/balatro/versions.env
          prev() { grep -E "^$1=" "$PREV" 2>/dev/null | tail -1 | cut -d= -f2-; }
          pick() { if [ "$2" = 1 ]; then echo "$TAG"; else local p; p="$(prev "$1")"; echo "${p:-latest}"; fi; }
          LB_TAG=$(pick LEAGUE_BOT_TAG '${{ steps.pick.outputs.league_bot }}')
          LW_TAG=$(pick LEAGUE_WEB_TAG '${{ steps.pick.outputs.league_web }}')
          # Rewrite only the two LEAGUE_* lines, preserving GHCR_OWNER + everything else.
          tmp="$(mktemp)"
          grep -vE '^(LEAGUE_BOT_TAG|LEAGUE_WEB_TAG)=' "$PREV" > "$tmp" || true
          { echo "LEAGUE_BOT_TAG=$LB_TAG"; echo "LEAGUE_WEB_TAG=$LW_TAG"; } >> "$tmp"
          mv "$tmp" "$PREV"
          echo "rolling league: league-bot=$LB_TAG league-web=$LW_TAG"
          cd /srv/balatro/repo/infra/compose
          E="--env-file /srv/balatro/versions.env --env-file /srv/balatro/secrets.env"
          # Web is safe to restart anytime.
          docker compose -p balatro $E up -d league-web
          # Ban-phase guard: if the bot is being rolled, don't interrupt a live ban/pick
          # phase. Wait for click-sensitive sessions to clear (re-check every 30s up to
          # ~10 min), then roll regardless (graceful shutdown makes a late roll a ~3s blip).
          if [ "${{ steps.pick.outputs.league_bot }}" = 1 ]; then
            SENS="'GAME_1_BAN','GAME_1_PICK','GAME_2_CHOOSE_FIRST','GAME_2_BAN','GAME_2_PICK','GAME_3_CHOOSE_FIRST','GAME_3_BAN','GAME_3_PICK'"
            for i in $(seq 1 20); do
              ACTIVE=$(docker exec balatro-postgres-1 psql -U postgres -d league -tA \
                -c "SELECT count(*) FROM \"MatchSession\" WHERE state IN ($SENS);" 2>/dev/null | tr -d '[:space:]')
              if [ "${ACTIVE:-0}" = 0 ]; then echo "no live ban/pick phases -- rolling bot"; break; fi
              echo "holding bot roll: $ACTIVE live ban/pick session(s) (check $i/20) -- retry in 30s"
              sleep 30
            done
          fi
          docker compose -p balatro $E up -d league-bot
          # League dev web (separate project + dev env file).
          EDEV="--env-file /srv/balatro/versions.env --env-file /srv/balatro/secrets.dev.env"
          docker compose -p balatro-dev $EDEV -f docker-compose.dev.yml up -d league-web-dev || echo "[dev] league-web-dev roll skipped"
          docker image prune -f

      # Deploy visibility: post the outcome to the Discord devops channel. The
      # webhook URL lives box-local in secrets.env (never in git/GH secrets);
      # the runner runs on the box so it can read it. Never fails the job.
      - name: Notify devops channel
        if: always()
        run: |
          URL=$(grep -E '^DEPLOY_WEBHOOK_URL=' /srv/balatro/secrets.env 2>/dev/null | cut -d= -f2-) || true
          [ -z "$URL" ] && { echo "no deploy webhook configured -- skipping"; exit 0; }
          [ "${{ job.status }}" = "success" ] && ICON="✅" || ICON="❌"
          MODE="build-only"
          { [ "${{ github.event_name }}" = "push" ] || [ "${{ inputs.deploy }}" = "true" ]; } && MODE="DEPLOYED"
          MSG="$ICON **league** $MODE \`${{ steps.v.outputs.tag }}\` (bot=${{ steps.pick.outputs.league_bot }} web=${{ steps.pick.outputs.league_web }}) — <https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}>"
          curl -sf -m 10 -H 'Content-Type: application/json' -d "{\"content\":\"$MSG\"}" "$URL" || echo "notify failed (non-fatal)"
