name: CI

on:
  push:
  pull_request:

jobs:
  bot:
    name: bot — typecheck + tests
    runs-on: ubuntu-latest
    env:
      # Only these three are required by env.ts (the rest are optional / defaulted).
      # The integration suite overrides DATABASE_URL with its embedded Postgres.
      DISCORD_TOKEN: ci-dummy-token
      DISCORD_CLIENT_ID: "0"
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      # embedded-postgres downloads a real Postgres binary and runs it locally —
      # no Docker service needed on the runner.
      - run: npm run test:integration

  web-e2e:
    name: web — E2E (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
        working-directory: web
      - run: npx playwright install --with-deps chromium
        working-directory: web
      # Fully hermetic: e2e/server.mjs boots an embedded Postgres + the web app
      # with test env (dummy Discord creds, no bot) — no real Discord, no
      # external services. Also catches build/module-resolution errors, since
      # the global layout (⌘K palette) is compiled on the first page load.
      - run: npm run e2e
        working-directory: web
